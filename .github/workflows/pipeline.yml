name: End-to-End Football Pipeline

on:
  push:
    branches:
      - main
    # The pipeline wakes up if ANY of these files change
    paths:
      - 'harvester.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'main.bicep'
      - '.github/workflows/pipeline.yml'

jobs:
  # ----------------------------------------------------
  # JOB 1: BUILD THE DOCKER IMAGE
  # ----------------------------------------------------
  build_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      docker_changed: ${{ steps.check_files.outputs.docker_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Trick to see if Docker files actually changed
      - name: Check for Docker changes
        id: check_files
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker_changed:
              - 'harvester.py'
              - 'Dockerfile'
              - 'requirements.txt'

      # Only run the actual build steps if those files changed
      - name: Log in to GitHub Container Registry
        if: steps.check_files.outputs.docker_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_REGISTRY_PASSWORD }}

      - name: Downcase repository name
        if: steps.check_files.outputs.docker_changed == 'true'
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build and push Docker image
        if: steps.check_files.outputs.docker_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest

  # ----------------------------------------------------
  # JOB 2: DEPLOY INFRASTRUCTURE & CONTAINER TO AZURE
  # ----------------------------------------------------
  deploy_to_azure:
    name: Deploy Container to Azure
    runs-on: ubuntu-latest
    needs: build_docker # <-- This ensures Job 1 finishes first if it runs
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infrastructure (Bicep)
        run: |
          az group create --name rg-football-stats --location uksouth --tags "football-stats-environment=dev"
          
          # --- THE CATCH-ALL PURGE SCRIPT ---
          echo "Checking for ANY deleted Key Vaults..."
          
          # Notice we removed the starts_with filter so it catches everything
          DELETED_VAULTS=$(az keyvault list-deleted --query "[].name" -o tsv)
          
          if [ ! -z "$DELETED_VAULTS" ]; then
            for vault in $DELETED_VAULTS; do
              echo "Purging deleted vault: $vault"
              az keyvault purge --name $vault
            done
            echo "Waiting 60 seconds for Azure's backend to fully clear the names..."
            sleep 60 
          else
            echo "No deleted vaults found. Moving on!"
          fi
          # ------------------------------------

          az deployment group create \
            --resource-group rg-football-stats \
            --template-file main.bicep \
            --parameters sqlAdminUser=dbadmin sqlAdminPassword=${{ secrets.DB_PASSWORD }} myIpAddress=0.0.0.0

      - name: Downcase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Get dynamic SQL Server Name
        run: |
          SERVER_NAME=$(az sql server list --resource-group rg-football-stats --query "[0].name" -o tsv)
          echo "SQL_SERVER=$SERVER_NAME" >> $GITHUB_ENV

      - name: Deploy to Azure Container Instances (ACI)
        run: |
          az container create \
            --resource-group rg-football-stats \
            --name aci-football-harvester \
            --image ghcr.io/${{ env.REPO }}:latest \
            --registry-login-server ghcr.io \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GH_REGISTRY_PASSWORD }} \
            --restart-policy Never \
            --location uksouth \
            --environment-variables \
                DB_SERVER=${{ env.SQL_SERVER }}.database.windows.net \
                DB_NAME=sqldb-football-stats \
                DB_USER=dbadmin \
            --secure-environment-variables \
                DB_PASS=${{ secrets.DB_PASSWORD }}