name: Build and Push Docker Image

# Run this pipeline every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build_image:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest # This is the temporary cloud server GitHub gives 
    
    # We have to explicitly give the pipeline permission to upload packages
    permissions:
      contents: read
      packages: write 

    steps:
      # Download your code onto the temporary server
      - name: Check out repository
        uses: actions/checkout@v4

      # Log into GitHub's Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      # Convert repository name to lowercase (Docker requires lowercase names)
      - name: Downcase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      # Build the Docker image and push it
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest